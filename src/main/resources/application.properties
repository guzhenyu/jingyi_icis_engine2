spring.application.name=jingyi_icis_engine
spring.profiles.active=prod

server.port=8080
# https
# server.port=8443
# server.ssl.key-store=classpath:jingyicare_keystore.p12
# server.ssl.key-store-password=jykj@8888
# server.ssl.keyStoreType=PKCS12
# server.ssl.keyAlias=jingyicarecert

# security
logging.level.org.springframework.security=DEBUG
jingyi.passwordencoder.bcrypt-strength=10

# prometheus
management.endpoints.web.exposure.include=health,info,prometheus,env
management.endpoint.prometheus.enabled=true
management.endpoint.env.keys-to-sanitize=DO_NOT_MATCH_ANYTHING
management.endpoint.env.show-values=ALWAYS

# static resources
spring.web.resources.static-locations=file:./reports/,classpath:/META-INF/resources/,classpath:/resources/,classpath:/static/,classpath:/public/

# config files
jingyi.textresources.icis_qc_config=classpath:/config/pbtxt/icis_qc_config.pb.txt
jingyi.textresources.common_text=classpath:/config/pbtxt/common_text.pb.txt
jingyi.textresources.user_config=classpath:/config/pbtxt/common_user.pb.txt
jingyi.textresources.engine_config=classpath:/config/pbtxt/engine_config.pb.txt
cert_pb_txt=
public_key_file_path=
config_pb_txt=

engine_port=50001
engine_ext_url=192.168.0.49
engine_ext_port=50002

# patient module
patient.sync.start_delay_minutes=3
patient.sync.interval_minutes=3
patient.sync.thread_join_timeout_seconds=10

# monitoring module
monitoring.enable_hourly_approx=true
monitoring.hourly_approx_boundary_minutes=10
# true: 为每类引流管自动添加color等观察项参数; false: 不添加
monitoring.enable_drainage=true
monitoring.enable_drainage_params=true

# monitoring/nursing report
jingyi.textresources.charset=UTF-8
jingyi.report.charset=UTF-8
jingyi.report.font=classpath:/fonts/msyh.ttf
jingyi.report.root-path=./reports/
# 'ah2': 安徽省二院; 'compact': 紧凑版(预留); 'standard': 通用版
jingyi.report.monitoring.version=ah2
# 省二院模版下
#   template=classpath:/config/pbtxt/hospitals/report_template_ah2.pb.txt
#   variant=ah2
# 休宁模版下
#   template=classpath:/config/pbtxt/hospitals/report_template_xiuning.pb.txt
#   variant=xiuning
jingyi.report.ah2.template=classpath:/config/pbtxt/hospitals/report_template_ah2.pb.txt
jingyi.report.ah2.variant=ah2
jingyi.report.ah2.font=${jingyi.report.font}
jingyi.report.ah2.ward-report-font=${jingyi.report.font}
jingyi.report.ah2.generation-lock-stale-minutes=30
jingyi.report.ah2.draw-line-for-empty-rows=true
jingyi.report.compact.template=classpath:/config/pbtxt/hospitals/xaxrmyy_report_compact.pb.txt
jingyi.report.compact.font=${jingyi.report.font}
jingyi.report.compact.patient-monitoring-records.filter-empty-params=true
jingyi.report.compact.patient-balance-records.drainage-tube-params=compactreportdrainagetubeparams
jingyi.report.compact.medication-ml-decimal-places=1
# true: 每个班次取最早一组管道维护记录; false: 每个班次取最晚一组管道维护记录
jingyi.report.compact.tube-policy.first-record-in-shift=true
jingyi.report.compact.skincare.attr-code-whitelist=

# 无纸化 archives
jingyi.archives.root-path=./archives/
# 云迭科技无纸化视图URL根地址，后续会在此基础上拼接具体的视图URL路径
jingyi.archives.yundie.archive-url-root='http://10.87.96.26:8080'
